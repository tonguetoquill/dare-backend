quill:
  name: cmu_letter
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  description: Official Carnegie Mellon University letterhead letter — an exact replica of the university's MS Word letterhead template. For formal correspondence with external parties (donors, partners, agencies, applicants) signed by a named sender.

main:
  body:
    example: |
      On behalf of Dietrich College, thank you for your generous support.

      Write in complete, professional paragraphs separated by blank lines.
      Keep the tone warm but formal; letters are typically three to five
      short paragraphs.
  fields:
    recipient:
      type: array
      items:
        type: string
      example:
        - Ms. Eleanor Whitfield
        - The Whitfield Family Foundation
        - 300 Grant Street, Suite 4200
        - Pittsburgh, PA 15219
      ui:
        group: Addressing
      description: "Required. Recipient address block, one line per entry: name (with title), organization, street address, then 'City, State ZIP'."

    salutation:
      type: string
      example: "Dear Ms. Whitfield,"
      ui:
        group: Addressing
      description: "Required. Full salutation line including 'Dear' and the trailing comma."

    date:
      type: string
      example: July 12, 2026
      ui:
        group: Addressing
      description: "Human-readable date, format 'Month D, YYYY'. Omit to use today's date."

    closing:
      type: string
      default: "Sincerely,"
      example: "Sincerely,"
      ui:
        group: Signature
      description: "Complimentary close including the trailing comma (e.g. 'Sincerely,' or 'Regards,'). Omit to use 'Sincerely,'."

    signature_name:
      type: string
      example: Dr. Jane Rivera
      ui:
        group: Signature
      description: Required. Sender's full name, set below the wet-signature space.

    signature_title:
      type: string
      default: ""
      example: Dean, Dietrich College of Humanities and Social Sciences
      ui:
        group: Signature
      description: Optional sender title, shown on the line under the name.

    department:
      type: string
      default: ""
      example: Dietrich College of Humanities and Social Sciences
      ui:
        group: Letterhead
      description: Department or unit name shown bold at the top of the letterhead address block. Omit for university-level correspondence.

    address:
      type: array
      items:
        type: string
      example:
        - Carnegie Mellon University
        - 5000 Forbes Avenue
        - Pittsburgh, PA 15213-3890
      ui:
        group: Letterhead
      description: Letterhead address lines under the department. Omit to use the university's official address.

    website:
      type: string
      default: ""
      example: cmu.edu
      ui:
        group: Letterhead
      description: Web address shown at the bottom of the letterhead block. Omit to use 'cmu.edu'.
