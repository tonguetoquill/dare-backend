services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dare-web
    command: web
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DOCKER_DJANGO_SETTINGS_MODULE:-config.settings.production}
      DJANGO_DEBUG: ${DOCKER_DJANGO_DEBUG:-False}
      ENVIRONMENT: ${DOCKER_ENVIRONMENT:-production}
      DB_HOST: ${DOCKER_DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      WEAVIATE_HOST: ${DOCKER_WEAVIATE_HOST:-weaviate}
      WEAVIATE_PORT: ${WEAVIATE_PORT:-8080}
      OLLAMA_HOST: ${DOCKER_OLLAMA_HOST:-http://ollama:11434}
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/"]
      interval: ${WEB_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${WEB_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${WEB_HEALTHCHECK_RETRIES:-5}
      start_period: ${WEB_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dare-worker
    command: worker
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DOCKER_DJANGO_SETTINGS_MODULE:-config.settings.production}
      DJANGO_DEBUG: ${DOCKER_DJANGO_DEBUG:-False}
      ENVIRONMENT: ${DOCKER_ENVIRONMENT:-production}
      DB_HOST: ${DOCKER_DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      WEAVIATE_HOST: ${DOCKER_WEAVIATE_HOST:-weaviate}
      WEAVIATE_PORT: ${WEAVIATE_PORT:-8080}
      OLLAMA_HOST: ${DOCKER_OLLAMA_HOST:-http://ollama:11434}
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: dare-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dare_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set_DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dare_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dare-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.26.1
    container_name: dare-weaviate
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
      - "${WEAVIATE_GRPC_PORT:-50051}:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25}
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: ${WEAVIATE_AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED:-true}
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: ${WEAVIATE_CLUSTER_HOSTNAME:-node1}
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped

  weaviate-console:
    image: semitechnologies/weaviate-console:latest
    container_name: dare-weaviate-console
    ports:
      - "${WEAVIATE_CONSOLE_PORT:-8081}:80"
    environment:
      WEAVIATE_URL: ${WEAVIATE_CONSOLE_URL:-http://weaviate:8080}
    restart: on-failure:0
    profiles:
      - debug

  ollama:
    image: ollama/ollama:latest
    container_name: dare-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-16G}
        reservations:
          memory: ${OLLAMA_MEMORY_RESERVATION:-8G}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - llama

  quillmark-mcp:
    build:
      context: ./quillmark-mcp
      dockerfile: Dockerfile
    image: quillmark-mcp:dev
    container_name: dare-quillmark
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      # Debug only — DARE talks to quillmark over the compose network; the
      # backend proxies rendered PDFs, so the browser never needs this port.
      # 8090 because weaviate owns 8080 on the host.
      - "127.0.0.1:${QUILLMARK_DEBUG_PORT:-8090}:8080"
    volumes:
      - ./cmu-quiver:/quiver:ro
      - quillmark_artifacts:/data/artifacts
    environment:
      LOG_LEVEL: info
      QUILLMARK_BIND: 0.0.0.0:8080
      QUILLMARK_ENDPOINT: /mcp
      QUILLMARK_QUIVER_DIR: /quiver
      QUILLMARK_OUTPUT_DIR: /data/artifacts
      # Consumed only by the DARE backend over the compose network.
      QUILLMARK_BASE_URL: http://quillmark-mcp:8080/artifacts
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  quillmark_artifacts:
    driver: local
  redis_data:
    driver: local
  weaviate_data:
    driver: local
  static_data:
    driver: local
  media_data:
    driver: local
  ollama_data:
    driver: local
